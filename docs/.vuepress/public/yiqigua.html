<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易起卦 - 易经学习与起卦占卜</title>
  <meta name="description" content="易起卦 - 易经学习与起卦占卜应用。千年智慧，触手可及。学习易经六十四卦，掌握起卦占卜之道。">
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-surface: rgba(255,255,255,0.04);
      --color-surface-hover: rgba(255,255,255,0.08);
      --color-border: rgba(255,255,255,0.1);
      --color-border-hover: rgba(255,255,255,0.15);
      --color-text: #ffffff;
      --color-text-muted: rgba(255,255,255,0.65);
      --color-text-subtle: rgba(255,255,255,0.45);
      --color-accent: #c9a961;
      --color-accent-light: #e5d4a1;
      --color-accent-dark: #9a7b3a;
      --color-glow: rgba(201,169,97,0.2);
      --spacing-xs: 8px;
      --spacing-sm: 16px;
      --spacing-md: 24px;
      --spacing-lg: 48px;
      --spacing-xl: 72px;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 28px;
      --radius-xl: 40px;
      --transition-fast: 150ms ease;
      --transition-normal: 280ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 450ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,169,97,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(201,169,97,0.05) 0%, transparent 40%),
        radial-gradient(ellipse 50% 30% at 0% 50%, rgba(255,255,255,0.02) 0%, transparent 30%);
    }

    .bg-layer::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
    }

    /* Floating Bagua */
    .floating-bagua {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .bagua-symbol {
      position: absolute;
      opacity: 0.03;
      animation: drift 30s ease-in-out infinite;
    }

    .bagua-symbol:nth-child(1) { top: 8%; left: 12%; animation-delay: 0s; }
    .bagua-symbol:nth-child(2) { top: 20%; right: 8%; animation-delay: -8s; }
    .bagua-symbol:nth-child(3) { bottom: 25%; left: 6%; animation-delay: -16s; }
    .bagua-symbol:nth-child(4) { bottom: 12%; right: 18%; animation-delay: -24s; }

    @keyframes drift {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.03; }
      50% { transform: translateY(-50px) rotate(20deg); opacity: 0.05; }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      max-width: 920px;
      margin: 0 auto;
      padding: var(--spacing-lg) var(--spacing-sm);
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: var(--spacing-xl) var(--spacing-sm) var(--spacing-lg);
      animation: reveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-icon-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: var(--spacing-lg);
    }

    .hero-icon {
      width: 140px;
      height: 140px;
      border-radius: var(--radius-xl);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        0 20px 50px -10px rgba(0,0,0,0.5),
        0 40px 80px -20px rgba(201,169,97,0.15);
      transition: transform var(--transition-slow), box-shadow var(--transition-normal);
    }

    .hero-icon:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 30px 70px -15px rgba(0,0,0,0.6),
        0 60px 100px -30px rgba(201,169,97,0.2);
    }

    .hero-glow {
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle, var(--color-glow) 0%, transparent 60%);
      border-radius: 50%;
      z-index: -1;
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(0.95); }
      50% { opacity: 0.6; transform: scale(1.08); }
    }

    .hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 18px;
      margin-bottom: var(--spacing-sm);
      color: var(--color-text);
    }

    .hero-subtitle {
      color: var(--color-text-muted);
      font-size: 17px;
      line-height: 1.9;
      letter-spacing: 3px;
      margin-bottom: var(--spacing-xs);
    }

    .hero-tagline {
      color: var(--color-accent);
      font-size: 13px;
      letter-spacing: 4px;
      opacity: 0.9;
      margin-bottom: var(--spacing-lg);
    }

    /* Download buttons */
    .download-btns {
      display: flex;
      justify-content: center;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 28px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition-normal);
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-dark) 100%);
      border: 1px solid transparent;
      color: #000;
      box-shadow: 0 8px 30px -8px rgba(201,169,97,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px -8px rgba(201,169,97,0.5);
      background: linear-gradient(135deg, var(--color-accent-light) 0%, var(--color-accent) 100%);
    }

    .btn-secondary {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text);
    }

    .btn-secondary:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-accent);
      color: var(--color-accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px -12px rgba(0,0,0,0.4);
    }

    .btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Section spacing */
    section {
      padding: var(--spacing-xl) var(--spacing-sm);
    }

    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 6px;
      margin-bottom: var(--spacing-lg);
      color: var(--color-text);
    }

    /* WeChat glass card */
    .wechat-card {
      max-width: 400px;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }

    .wechat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.5);
    }

    .wechat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,169,97,0.15);
      color: var(--color-accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: var(--spacing-sm);
    }

    .wechat-badge svg {
      width: 14px;
      height: 14px;
    }

    .wechat-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .wechat-desc {
      color: var(--color-text-subtle);
      font-size: 13px;
      margin-bottom: var(--spacing-md);
    }

    .qr-frame {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 30px -8px rgba(0,0,0,0.3);
      transition: transform var(--transition-normal);
    }

    .qr-frame:hover {
      transform: scale(1.05);
    }

    .qr-frame img {
      width: 150px;
      height: 150px;
      display: block;
      border-radius: var(--radius-sm);
    }

    /* Features */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
    }

    .feature-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      text-align: center;
      transition: all var(--transition-normal);
      backdrop-filter: blur(12px);
    }

    .feature-card:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-border-hover);
      transform: translateY(-6px);
      box-shadow: 0 25px 50px -20px rgba(0,0,0,0.35);
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      margin-bottom: var(--spacing-sm);
      color: var(--color-accent);
    }

    .feature-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature-desc {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    /* Phone mockup screenshots */
    .screenshots-wrap {
      display: flex;
      justify-content: center;
      gap: var(--spacing-lg);
      flex-wrap: wrap;
      perspective: 1000px;
    }

    .phone-mockup {
      position: relative;
      width: 280px;
      background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
      border-radius: 36px;
      padding: 12px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 30px 80px -20px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform var(--transition-normal);
      transform-style: preserve-3d;
    }

    .phone-mockup:hover {
      transform: translateY(-10px) rotateX(5deg);
    }

    .phone-mockup::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 24px;
      background: #0a0a0a;
      border-radius: 12px;
      z-index: 2;
    }

    .phone-screen {
      position: relative;
      width: 100%;
      aspect-ratio: 1200 / 2608;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }

    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 30%;
      height: 28px;
      background: #0a0a0a;
      border-radius: 0 0 16px 16px;
      z-index: 1;
    }

    /* Footer */
    .footer {
      padding: var(--spacing-lg) var(--spacing-sm);
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-link {
      color: var(--color-text-subtle);
      font-size: 13px;
      text-decoration: none;
      letter-spacing: 2px;
      transition: color var(--transition-fast);
    }

    .footer-link:hover {
      color: var(--color-accent);
    }

    .footer-link:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 4px;
    }

    .footer-copy {
      color: var(--color-text-subtle);
      font-size: 11px;
      margin-top: var(--spacing-xs);
      letter-spacing: 3px;
      opacity: 0.7;
    }

    /* Responsive */
    @media (max-width: 768px) {
      :root {
        --spacing-xl: 56px;
        --spacing-lg: 40px;
      }

      .hero-title {
        font-size: 38px;
        letter-spacing: 12px;
      }

      .hero-icon {
        width: 110px;
        height: 110px;
        border-radius: 28px;
      }

      .hero-glow {
        inset: -30px;
      }

      .features-grid {
        grid-template-columns: 1fr;
        gap: var(--spacing-sm);
      }

      .phone-mockup {
        width: 240px;
        padding: 10px;
        border-radius: 30px;
      }

      .phone-mockup::before {
        width: 60px;
        height: 20px;
        top: 10px;
      }

      .phone-screen {
        border-radius: 20px;
      }

      .screenshots-wrap {
        gap: var(--spacing-md);
      }
    }

    @media (max-width: 480px) {
      :root {
        --spacing-xl: 44px;
        --spacing-lg: 32px;
        --spacing-md: 20px;
      }

      .content {
        padding: var(--spacing-md) var(--spacing-xs);
      }

      .hero-title {
        font-size: 30px;
        letter-spacing: 8px;
      }

      .hero-subtitle {
        font-size: 14px;
        letter-spacing: 2px;
      }

      .hero-tagline {
        font-size: 11px;
      }

      .download-btns {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .btn {
        width: 100%;
        max-width: 260px;
        padding: 13px 24px;
      }

      .wechat-card {
        padding: var(--spacing-md);
      }

      .qr-frame img {
        width: 130px;
        height: 130px;
      }

      .phone-mockup {
        width: 200px;
        padding: 8px;
        border-radius: 26px;
      }

      .phone-mockup::before {
        width: 50px;
        height: 16px;
        top: 8px;
      }

      .phone-screen {
        border-radius: 18px;
      }

      .phone-notch {
        height: 22px;
      }

      .section-title {
        font-size: 22px;
        letter-spacing: 4px;
      }

      .feature-card {
        padding: var(--spacing-sm);
      }

      .feature-title {
        font-size: 15px;
      }

      .bagua-symbol {
        opacity: 0.02;
      }
    }
  </style>
</head>

    <!-- Features -->
    <section>
      <h2 class="section-title">核心功能</h2>
      <div class="features-grid">
        <article class="feature-card">
